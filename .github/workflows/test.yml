name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run lint
        run: npm run lint
        continue-on-error: true
      
      - name: Run tests
        run: npm run test:run
        env:
          VITE_FIREBASE_PROJECT_ID: estante-75463
          FIREBASE_DATABASE_URL: https://estante-75463-default-rtdb.firebaseio.com
      
      - name: Generate coverage
        run: npm run test:coverage
        continue-on-error: true
